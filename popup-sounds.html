<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test sons popup</title>
  <style>
    body{font-family:Montserrat,Arial,sans-serif;background:#f6f7f9;color:#121212;margin:0;padding:24px}
    .wrap{max-width:760px;margin:0 auto}
    h1{font-size:28px;line-height:1.2;margin:0 0 10px}
    p{margin:0 0 18px;line-height:1.5}
    .grid{display:grid;grid-template-columns:1fr;gap:10px}
    button{border:1px solid #ddd;background:#fff;border-radius:12px;padding:14px 16px;font-size:16px;font-weight:700;cursor:pointer;text-align:left}
    button:hover{border-color:#ffae00}
    .hint{margin-top:14px;font-size:14px;color:#555}
    @media(min-width:740px){.grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Pre-ecoute sons popup</h1>
    <p>Appuie sur un bouton pour ecouter. Ensuite dis-moi juste le numero (1 a 5).</p>
    <div class="grid">
      <button data-sound="1">1. Soft Bell (discret)</button>
      <button data-sound="2">2. Warm Chime (plus premium)</button>
      <button data-sound="3">3. Bright Ping (plus visible)</button>
      <button data-sound="4">4. Double Tap (court et clair)</button>
      <button data-sound="5">5. Glass Tone (leger)</button>
    </div>
    <p class="hint">Sur iPhone, le son se joue seulement apres un geste utilisateur: c'est normal.</p>
  </div>

  <script>
    (function(){
      var Ctx=window.AudioContext||window.webkitAudioContext;
      var ctx=Ctx?new Ctx():null;

      function env(g, now, peak, end){
        g.gain.setValueAtTime(0.0001, now);
        g.gain.exponentialRampToValueAtTime(peak, now+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, now+end);
      }

      function tone(type, freq, start, dur, gainNode){
        var o=ctx.createOscillator();
        o.type=type;
        o.frequency.setValueAtTime(freq, start);
        o.connect(gainNode);
        o.start(start);
        o.stop(start+dur);
      }

      function play(kind){
        if(!ctx){return;}
        if(ctx.state==="suspended"){ctx.resume();}
        var now=ctx.currentTime+0.01;
        var g=ctx.createGain();
        g.connect(ctx.destination);

        if(kind==="1"){
          env(g, now, 0.045, 0.34);
          tone("triangle", 880, now, 0.16, g);
          tone("sine", 1174, now+0.12, 0.2, g);
        }else if(kind==="2"){
          env(g, now, 0.05, 0.42);
          tone("sine", 784, now, 0.2, g);
          tone("triangle", 1047, now+0.1, 0.24, g);
          tone("sine", 1318, now+0.2, 0.18, g);
        }else if(kind==="3"){
          env(g, now, 0.055, 0.28);
          tone("square", 1320, now, 0.08, g);
          tone("triangle", 1760, now+0.06, 0.12, g);
        }else if(kind==="4"){
          env(g, now, 0.05, 0.46);
          tone("triangle", 988, now, 0.09, g);
          tone("triangle", 988, now+0.16, 0.09, g);
          tone("sine", 1480, now+0.24, 0.14, g);
        }else{
          env(g, now, 0.04, 0.36);
          tone("sine", 660, now, 0.14, g);
          tone("sine", 990, now+0.11, 0.16, g);
          tone("triangle", 1320, now+0.2, 0.12, g);
        }
      }

      document.querySelectorAll("button[data-sound]").forEach(function(btn){
        btn.addEventListener("click", function(){ play(btn.getAttribute("data-sound")); });
      });
    })();
  </script>
</body>
</html>
